networks:
  zabbix-net:
    driver: bridge

volumes:
  snmptraps:

services:

  # ---- MySQL (Zabbix DB) ----
  mysql-server:
    image: mysql:8.0
    container_name: mysql-server
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./my.cnf:/etc/mysql/conf.d/my.cnf
      - /usr/share/zoneinfo:/usr/share/zoneinfo:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks: [zabbix-net]
    restart: unless-stopped

  # ---- Java Gateway ----
  zabbix-java-gateway:
    image: zabbix/zabbix-java-gateway:alpine-${ZABBIX_VERSION}
    container_name: zabbix-java-gateway
    ports:
      - "10052:10052"
    environment:
      ZBX_DEBUGLEVEL: "3"
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/127.0.0.1/10052'"]
      interval: 10s
      timeout: 3s
      retries: 30
    networks: [zabbix-net]
    restart: unless-stopped

  # ---- Zabbix Server ----
  zabbix-server-mysql:
    image: zabbix/zabbix-server-mysql:alpine-${ZABBIX_VERSION}
    container_name: zabbix-server-mysql
    ports:
      - "10051:10051"
    environment:
      DB_SERVER_HOST: "${DB_SERVER_HOST}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      ZBX_JAVAGATEWAY: "${ZBX_JAVAGATEWAY}"
    depends_on:
      mysql-server:
        condition: service_healthy
      zabbix-java-gateway:
        condition: service_healthy
    volumes:
      - snmptraps:/var/lib/zabbix/snmptraps:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/127.0.0.1/10051'"]
      interval: 10s
      timeout: 3s
      retries: 30
    networks: [zabbix-net]
    restart: unless-stopped

  # ---- Zabbix Proxy (MySQL) ----
  zabbix-proxy-mysql:
    image: zabbix/zabbix-proxy-mysql:alpine-${ZABBIX_VERSION}
    container_name: zabbix-proxy-mysql
    environment:
      DB_SERVER_HOST: "${DB_SERVER_HOST}"
      MYSQL_DATABASE: "${MYSQL_DATABASE_PROXY}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
    depends_on:
      mysql-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/127.0.0.1/10051'"]
      interval: 10s
      timeout: 3s
      retries: 30
    networks: [zabbix-net]
    restart: unless-stopped

  # ---- Frontend Web (Apache + PHP) ----
  zabbix-frontend-apache-mysql:
    image: zabbix/zabbix-web-apache-mysql:alpine-${ZABBIX_VERSION}
    container_name: zabbix-frontend-apache-mysql
    ports:
      - "8081:8080"
    environment:
      ZBX_SERVER_HOST: "${ZBX_SERVER_HOST}"
      DB_SERVER_HOST: "${DB_SERVER_HOST}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      PHP_TZ: "${PHP_TZ}"
    depends_on:
      zabbix-server-mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/ >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
    networks: [zabbix-net]
    restart: unless-stopped

  # ---- Agente ----
  zabbix-agent:
    image: zabbix/zabbix-agent:alpine-${ZABBIX_VERSION}
    container_name: zabbix-agent
    ports:
      - "10050:10050"
    environment:
      ZBX_SERVER_HOST: "${ZBX_SERVER_HOST}"
      ZBX_HOSTNAME: "${ZBX_HOSTNAME}"
    depends_on:
      zabbix-server-mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "bash -lc '</dev/tcp/127.0.0.1/10050'"]
      interval: 10s
      timeout: 3s
      retries: 30
    networks: [zabbix-net]
    restart: unless-stopped

  # ---- SNMP Traps ----
  zabbix-snmp-traps:
    image: zabbix/zabbix-snmptraps:alpine-${ZABBIX_VERSION}
    container_name: zabbix-snmp-traps
    depends_on:
      zabbix-server-mysql:
        condition: service_healthy
    volumes:
      - snmptraps:/var/lib/zabbix/snmptraps
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f snmptrapd >/dev/null || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30
    networks: [zabbix-net]
    restart: unless-stopped
