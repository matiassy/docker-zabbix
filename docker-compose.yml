# CREAR LA RED
networks:
  zabbix-net:
    driver: bridge

# SERVICIOS
services:

  # BASE DE DATOS
  mysql-server:
    image: mysql:8.0
    container_name: mysql-server
    environment:
      MYSQL_DATABASE: "zabbix"
      MYSQL_USER: "lunix"
      MYSQL_PASSWORD: "lunix"
      MYSQL_ROOT_PASSWORD: "root"
    networks:
      - zabbix-net
    restart: unless-stopped
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./my.cnf:/etc/mysql/conf.d/my.cnf
      - /usr/share/zoneinfo:/usr/share/zoneinfo:ro

  # JAVA GATEWAY
  zabbix-java-gateway:
    image: zabbix/zabbix-java-gateway:alpine-7.0.5
    container_name: zabbix-java-gateway
    ports:
      - "10052:10052"
    networks:
      - zabbix-net
    restart: unless-stopped

  # SERVIDOR ZABBIX
  zabbix-server-mysql:
    image: zabbix/zabbix-server-mysql:alpine-7.0.5
    container_name: zabbix-server-mysql
    ports:
      - "10051:10051"
    environment:
      DB_SERVER_HOST: "mysql-server"
      MYSQL_DATABASE: "zabbix"
      MYSQL_USER: "lunix"
      MYSQL_PASSWORD: "lunix"
      MYSQL_ROOT_PASSWORD: "root"
      ZBX_JAVAGATEWAY: "zabbix-java-gateway"
    networks:
      - zabbix-net
    restart: unless-stopped
    depends_on:
      - mysql-server
      - zabbix-java-gateway

   # PROXY ZABBIX
  zabbix-proxy-mysql:
    image: zabbix/zabbix-proxy-mysql:alpine-7.0.5
    container_name: zabbix-proxy-mysql
    environment:
      DB_SERVER_HOST: "mysql-server"
      MYSQL_DATABASE: "zabbix_proxy"
      MYSQL_USER: "lunix"
      MYSQL_PASSWORD: "lunix"
      MYSQL_ROOT_PASSWORD: "root"
    networks:
      - zabbix-net
    restart: unless-stopped

  # FRONTEND PARA ZABBIX
  zabbix-frontend-apache-mysql:
    image: zabbix/zabbix-web-apache-mysql:alpine-7.0.5
    container_name: zabbix-frontend-apache-mysql
    ports:
      - "8081:8080"
    environment:
      ZBX_SERVER_HOST: "zabbix-server-mysql"
      DB_SERVER_HOST: "mysql-server"
      MYSQL_DATABASE: "zabbix"
      MYSQL_USER: "lunix"
      MYSQL_PASSWORD: "lunix"
      MYSQL_ROOT_PASSWORD: "root"
    networks:
      - zabbix-net
    restart: unless-stopped
    depends_on:
      - zabbix-server-mysql

  # AGENTE ZABBIX
  zabbix-agent:
    image: zabbix/zabbix-agent:alpine-7.0.5
    container_name: zabbix-agent
    environment:
      ZBX_SERVER_HOST: "zabbix-server-mysql"
      ZBX_HOSTNAME: "zabbix-server-agent"
    networks:
      - zabbix-net
    restart: unless-stopped

  # SNMP TRAPS
  zabbix-snmp-traps:
    image: zabbix/zabbix-snmptraps:alpine-7.0.5
    container_name: zabbix-snmp-traps
    networks:
      - zabbix-net
    restart: unless-stopped
