# Redes
networks:
  zabbix-net:
    driver: bridge

# Servicios
services:

  # Base de datos
  mysql-server:
    image: mysql:8.0
    container_name: mysql-server
    ports:
      - "3306:3306"
    environment:
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
    networks:
      - zabbix-net
    restart: unless-stopped
    volumes:
      - ./mysql-data:/var/lib/mysql
      - ./my.cnf:/etc/mysql/conf.d/my.cnf
      - /usr/share/zoneinfo:/usr/share/zoneinfo:ro

  # Java Gateway
  zabbix-java-gateway:
    image: zabbix/zabbix-java-gateway:alpine-7.0.18
    container_name: zabbix-java-gateway
    ports:
      - "10052:10052"
    networks:
      - zabbix-net
    restart: unless-stopped

  # Servidor Zabbix
  zabbix-server-mysql:
    image: zabbix/zabbix-server-mysql:alpine-7.0.18
    container_name: zabbix-server-mysql
    ports:
      - "10051:10051"
    environment:
      DB_SERVER_HOST: "${DB_SERVER_HOST}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
      ZBX_JAVAGATEWAY: "${ZBX_JAVAGATEWAY}"
    networks:
      - zabbix-net
    restart: unless-stopped
    depends_on:
      - mysql-server
      - zabbix-java-gateway

  # Proxy Zabbix
  zabbix-proxy-mysql:
    image: zabbix/zabbix-proxy-mysql:alpine-7.0.18
    container_name: zabbix-proxy-mysql
    environment:
      DB_SERVER_HOST: "${DB_SERVER_HOST}"
      MYSQL_DATABASE: "${MYSQL_DATABASE_PROXY}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
    networks:
      - zabbix-net
    restart: unless-stopped

  # Frontend para Zabbix
  zabbix-frontend-apache-mysql:
    image: zabbix/zabbix-web-apache-mysql:alpine-7.0.18
    container_name: zabbix-frontend-apache-mysql
    ports:
      - "8081:8080"
    environment:
      ZBX_SERVER_HOST: "${ZBX_SERVER_HOST}"
      DB_SERVER_HOST: "${DB_SERVER_HOST}"
      MYSQL_DATABASE: "${MYSQL_DATABASE}"
      MYSQL_USER: "${MYSQL_USER}"
      MYSQL_PASSWORD: "${MYSQL_PASSWORD}"
      MYSQL_ROOT_PASSWORD: "${MYSQL_ROOT_PASSWORD}"
    networks:
      - zabbix-net
    restart: unless-stopped
    depends_on:
      - zabbix-server-mysql

  # Agente Zabbix
  zabbix-agent:
    image: zabbix/zabbix-agent:alpine-7.0.18
    container_name: zabbix-agent
    environment:
      ZBX_SERVER_HOST: "${ZBX_SERVER_HOST}"
      ZBX_HOSTNAME: "${ZBX_HOSTNAME}"
    ports:
      - "10050:10050"
    networks:
      - zabbix-net
    restart: unless-stopped

  # SNMP Traps
  zabbix-snmp-traps:
    image: zabbix/zabbix-snmptraps:alpine-7.0.18
    container_name: zabbix-snmp-traps
    networks:
      - zabbix-net
    restart: unless-stopped
